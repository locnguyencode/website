<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LỘC CODER</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <h2 class="logo">Logo</h2>
      <nav class="navigation">
        <a href="#">Trang Chủ</a>
        <a href="#">Về Tôi</a>
        <a href="#">Dịch vụ</a>
        <a href="#">Liên hệ</a>
        <button class="btnLogin-popup">Đăng nhập</button>
      </nav>
    </header>
    <div class="wrapper">
      <span class="icon-close"><ion-icon name="close-outline"></ion-icon></span>
      <div class="form-box login">
        <h2>Đăng Nhập</h2>
        <form action="#">
          <div class="input-box">
            <span class="icon"><ion-icon name="mail"></ion-icon></span>
            <input type="email" required />
            <label>Email</label>
          </div>
          <div class="input-box">
            <span class="icon"><ion-icon name="lock-closed"></ion-icon></span>
            <input type="password" required />
            <label>Password</label>
          </div>
          <div class="remember-forgot">
            <label><input type="checkbox" />Bạn đồng ý với yêu cầu</label>
            <a href="#">Quên mật khẩu?</a>
          </div>
          <button type="submit" class="btn">Đăng Nhập</button>
          <div class="login-register">
            <p>
              Bạn chưa có tài khoản?<a href="#" class="register-link">
                Đăng ký
              </a>
            </p>
          </div>
        </form>
      </div>
      <div class="form-box register">
        <h2>Đăng Ký</h2>
        <form action="#">
          <div class="input-box">
            <span class="icon"><ion-icon name="person"></ion-icon></span>
            <input type="text" required />
            <label>Người Dùng</label>
          </div>
          <div class="input-box">
            <span class="icon"><ion-icon name="mail"></ion-icon></span>
            <input type="email" required />
            <label>Email</label>
          </div>
          <div class="input-box">
            <span class="icon"><ion-icon name="lock-closed"></ion-icon></span>
            <input type="password" required />
            <label>Password</label>
          </div>
          <div class="remember-forgot">
            <label
              ><input type="checkbox" />Tôi đồng ý với các điều khoản và điều
              kiện.</label
            >
          </div>
          <button type="submit" class="btn">Đăng ký</button>
          <div class="login-register">
            <p>
              Bạn đã có tài khoản chưa?<a href="#" class="login-link">
                Đăng Nhập
              </a>
            </p>
          </div>
        </form>
      </div>
    </div>
    <script src="script.js"></script>
    <script
      type="module"
      src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"
    ></script>
    <script
      nomodule
      src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"
    ></script>
  </body>
</html>
